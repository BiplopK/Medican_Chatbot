<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Assistant Chatbot</title>
<link rel="stylesheet" href="style.css">
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f7fb;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chat-container {
    width: 400px;
    height: 600px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.chat-header {
    background: #2a7fba;
    color: white;
    padding: 15px;
    font-size: 18px;
    font-weight: bold;
    text-align: center;
}

.chat-messages {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.message {
    margin-bottom: 10px;
    padding: 10px 14px;
    border-radius: 16px;
    max-width: 75%;
    font-size: 14px;
}

.user {
    background: #2a7fba;
    color: white;
    align-self: flex-end;
}

.bot {
    background: #e8f1fa;
    color: #333;
    align-self: flex-start;
}

.chat-input {
    display: flex;
    padding: 10px;
    border-top: 1px solid #ddd;
}

.chat-input input {
    flex: 1;
    padding: 10px;
    border-radius: 20px;
    border: 1px solid #ccc;
    outline: none;
}

.chat-input button {
    margin-left: 8px;
    padding: 10px 16px;
    border: none;
    border-radius: 20px;
    background: #2a7fba;
    color: white;
    cursor: pointer;
}

.chat-input button:hover {
    background: #1f5f8f;
}
</style>
</head>

<body>

<div class="chat-container">
    <div class="chat-header">
        🏥 Medical Assistant
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message bot">
            Hello! I am your medical assistant. How can I help you today?
        </div>
    </div>

    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Type your medical question...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
async function sendMessage() {
    const inputField = document.getElementById("userInput");
    const messageText = inputField.value.trim();
    if (!messageText) return;

    const chatMessages = document.getElementById("chatMessages");

    const userMessage = document.createElement("div");
    userMessage.classList.add("message", "user");
    userMessage.textContent = messageText;
    chatMessages.appendChild(userMessage);

    inputField.value = "";

    const botMessage = document.createElement("div");
    botMessage.classList.add("message", "bot");
    botMessage.textContent = "Typing...";
    chatMessages.appendChild(botMessage);

    const response = await fetch("/get", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ msg: messageText })
    });

    const data = await response.json();
    botMessage.textContent = data.answer;

    chatMessages.scrollTop = chatMessages.scrollHeight;
}
</script>

</body>
</html>
